<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>แก้ไขรายการ | CEVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root{--ceva-blue:#001a4c;--ceva-red:#e60000;--bg-gray:#f4f7fa}
        body{font-family:'Prompt',sans-serif;background:var(--bg-gray)}
        .sidebar{width:260px;height:100vh;position:fixed;background:var(--ceva-blue);color:white;padding-top:20px;z-index:1000}
        .main-content{margin-left:260px;padding:30px 40px;min-height:100vh}
        .sidebar-logo{text-align:center;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.1)}
        .sidebar-logo img{background:white;padding:8px 12px;border-radius:8px;width:80%}
        .nav-link{color:rgba(255,255,255,0.7);padding:12px 25px;font-weight:500;transition:all 0.3s}
        .nav-link.active{color:white;background:var(--ceva-red);border-left:4px solid white}
        .nav-link:hover{color:white;background:rgba(255,255,255,0.05);padding-left:32px}
        .user-panel{position:absolute;bottom:0;width:100%;padding:20px;background:rgba(0,0,0,0.2)}
        .ceva-card{background:white;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.04);margin-bottom:25px}
        .card-header{background:white;border-bottom:1px solid #edf2f9;padding:18px 25px;font-weight:600;color:var(--ceva-blue);border-radius:12px 12px 0 0}
        .form-control,.form-select{border-radius:8px;border:1px solid #dde3eb;padding:10px 15px}
        .form-control:focus,.form-select:focus{border-color:var(--ceva-blue);box-shadow:0 0 0 3px rgba(0,26,76,0.1)}
        .btn-save{background:var(--ceva-blue);color:white;border:none;border-radius:8px;padding:12px 30px;font-weight:600;transition:0.3s;font-size:1rem}
        .btn-save:hover{background:#002a7a;transform:translateY(-2px)}
        .btn-cancel{background:#6c757d;color:white;border:none;border-radius:8px;padding:12px 30px;font-weight:600;transition:0.3s;font-size:1rem}
        .btn-cancel:hover{background:#5a6268}
        .edit-badge{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:12px 18px;margin-bottom:20px}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-logo"><img src="{{ url_for('static', filename='logo.png') }}"></div>
    <div class="nav flex-column mt-3">
        <a href="{{ url_for('index') }}" class="nav-link active"><i class="bi bi-pencil-square me-2"></i>บันทึก & ประวัติ</a>
        <a href="{{ url_for('dashboard') }}" class="nav-link"><i class="bi bi-bar-chart-line-fill me-2"></i>สถิติ & กราฟ</a>
        <a href="{{ url_for('master_data') }}" class="nav-link"><i class="bi bi-database-fill-gear me-2"></i>ฐานข้อมูลหลัก</a>
        <a href="{{ url_for('manage_users') }}" class="nav-link"><i class="bi bi-people-fill me-2"></i>จัดการผู้ใช้งาน</a>
        <a href="{{ url_for('admin_clear') }}" class="nav-link"><i class="bi bi-trash3-fill me-2"></i>ล้างข้อมูล</a>
        <a href="{{ url_for('audit_log') }}" class="nav-link"><i class="bi bi-shield-check me-2"></i>Audit Log</a>
    </div>
    <div class="user-panel">
        <div class="fw-bold d-flex justify-content-between align-items-center">
            <span><i class="bi bi-person-circle me-2"></i>{{ session.username }}</span>
            <a href="{{ url_for('logout') }}" class="text-white"><i class="bi bi-box-arrow-right"></i></a>
        </div>
    </div>
</div>

<div class="main-content">
    <h3 class="fw-bold text-dark mb-3">
        <i class="bi bi-pencil-square me-2 text-warning"></i>แก้ไขรายการ
        <span class="badge bg-warning text-dark ms-2">Admin Only</span>
    </h3>

    <div class="edit-badge">
        <i class="bi bi-info-circle-fill text-warning me-2"></i>
        กำลังแก้ไขรายการ ID: <strong>{{ tx.id }}</strong> — เอกสาร: <strong>{{ tx.doc_number }}</strong>
        — การแก้ไขจะถูกบันทึกใน Audit Log ทุกครั้ง
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="ceva-card">
                <div class="card-header"><i class="bi bi-pencil-fill me-2"></i>แก้ไขข้อมูลรายการ</div>
                <div class="card-body p-4">
                    <form method="POST">

                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="fw-bold text-muted small">ประเภท</label>
                                <select class="form-select fw-bold" name="tx_type" required>
                                    <option value="IN" {% if tx.tx_type == 'IN' %}selected{% endif %}>📥 รับเข้า (IN)</option>
                                    <option value="OUT" {% if tx.tx_type == 'OUT' %}selected{% endif %}>📤 เบิกออก (OUT)</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="fw-bold text-muted small">วันที่ทำรายการ</label>
                                <input type="datetime-local" class="form-control" name="tx_date"
                                    value="{{ tx.timestamp[:16] | replace(' ', 'T') }}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold text-muted small">เลขเอกสาร</label>
                            <input type="text" class="form-control" name="doc_number" value="{{ tx.doc_number }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold text-muted small">ประเทศ / ปลายทาง</label>
                            <select class="form-select" name="country" required>
                                {% for c in countries %}
                                <option value="{{ c.name }}" {% if c.name == tx.country %}selected{% endif %}>{{ c.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="fw-bold text-muted small">PO Number</label>
                                <input type="number" class="form-control" name="po_number" value="{{ tx.po_number }}" min="0">
                            </div>
                            <div class="col-6">
                                <label class="fw-bold text-muted small">จำนวน Set</label>
                                <input type="number" class="form-control" name="quantity" value="{{ tx.quantity }}" min="0">
                            </div>
                        </div>

                        <hr class="my-3">
                        <p class="fw-bold text-muted small mb-2"><i class="bi bi-box-fill me-1"></i>จำนวนชิ้นจริง (แก้ไขได้อิสระ)</p>

                        <div class="row g-3 mb-4">
                            <div class="col-4">
                                <label class="fw-bold small text-primary">Base (ฐาน)</label>
                                <input type="number" class="form-control" name="base_qty" value="{{ tx.base_qty }}" min="0">
                            </div>
                            <div class="col-4">
                                <label class="fw-bold small text-danger">Lid (ฝา)</label>
                                <input type="number" class="form-control" name="lid_qty" value="{{ tx.lid_qty }}" min="0">
                            </div>
                            <div class="col-4">
                                <label class="fw-bold small text-dark">Collar (คอ)</label>
                                <input type="number" class="form-control" name="collar_qty" value="{{ tx.collar_qty }}" min="0">
                            </div>
                        </div>

                        <div class="d-flex gap-3">
                            <button type="submit" class="btn-save flex-fill"
                                onclick="return confirm('ยืนยันแก้ไขรายการนี้?')">
                                <i class="bi bi-check-circle-fill me-2"></i>บันทึกการแก้ไข
                            </button>
                            <a href="{{ url_for('index') }}" class="btn-cancel flex-fill text-center text-decoration-none">
                                <i class="bi bi-x-circle me-2"></i>ยกเลิก
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
