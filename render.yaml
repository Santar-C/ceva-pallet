services:
  - type: web
    name: ceva-pallet
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ceva-pallet-db
          property: connectionString

databases:
  - name: ceva-pallet-db
    databaseName: pallet_stock
    user: ceva_admin
    plan: free
